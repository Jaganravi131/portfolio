name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          prod: true

# NOTE: To use this workflow:
# 1) Create a GitHub repo (e.g. github.com/Jaganravi131/portfolio) and push this repo to it.
# 2) In your Vercel dashboard create a new project connected to that GitHub repo, or create a project and copy the Org ID and Project ID.
# 3) Add the following GitHub repository secrets: VERCEL_TOKEN (your personal token from Vercel), VERCEL_ORG_ID, VERCEL_PROJECT_ID.
# 4) Push to the `main` branch — this workflow will build and deploy to Vercel automatically.
